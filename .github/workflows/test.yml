name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install

      - name: Debug Environment Variables
        run: |
          if [ -z "$OSS_ACCESS_KEY_ID" ]; then
            echo "❌ OSS_ACCESS_KEY_ID is EMPTY from GitHub Secrets!"
          else
            echo "✅ OSS_ACCESS_KEY_ID is Present (Length: ${#OSS_ACCESS_KEY_ID})"
          fi
          if [ -z "$OSS_ACCESS_KEY_SECRET" ]; then
            echo "❌ OSS_ACCESS_KEY_SECRET is EMPTY from GitHub Secrets!"
          else
            echo "✅ OSS_ACCESS_KEY_SECRET is Present (Length: ${#OSS_ACCESS_KEY_SECRET})"
          fi
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}

      - name: Run tests
        run: pnpm test --coverage
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}

      - name: Upload results to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
